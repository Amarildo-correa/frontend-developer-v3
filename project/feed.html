<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <!-- Chrome Android — pinta a barra do navegador -->
        <meta name="theme-color" content="#0d1420" />
        <!-- iOS Safari — escurece a status bar (requer viewport-fit=cover) -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path fill='%237aa6e8' d='M1 3.5A1.5 1.5 0 0 1 2.5 2h2.764c.958 0 1.76.56 2.311 1.184C7.985 3.648 8.48 4 9 4h4.5A1.5 1.5 0 0 1 15 5.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5v-9zM2.5 3a.5.5 0 0 0-.5.5V6h12v-.5a.5.5 0 0 0-.5-.5H9c-.964 0-1.71-.629-2.174-1.154C6.374 3.334 5.82 3 5.264 3H2.5zM14 7H2v5.5a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5V7z'/></svg>"
            type="image/svg+xml"
        />
        <title>Frontend Developer</title>
        <!-- Bootstrap Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <!-- Container rolável do feed. O padding-bottom reserva a altura da
             navbar fixa para o último conteúdo não ficar escondido atrás dela. -->
        <main></main>

        <!-- Navbar inferior fixa. Dois níveis:
             • <nav class="navbar">      → a FAIXA: 100% da largura, moldura e fundo.
             • <div class="mosaico--navbar"> → a GRADE de botões, limitada à esquerda.
             O último bloco (--mais) só aparece quando os 6 não cabem. -->
        <nav class="navbar" aria-label="Navegação principal">
            <div class="mosaico mosaico--navbar">
                <button type="button" class="mosaico__bloco" aria-label="Início">
                    <i class="bi bi-house"></i>
                </button>
                <button type="button" class="mosaico__bloco" aria-label="Buscar">
                    <i class="bi bi-search"></i>
                </button>
                <button type="button" class="mosaico__bloco" aria-label="Explorar">
                    <i class="bi bi-compass"></i>
                </button>
                <button type="button" class="mosaico__bloco" aria-label="Notificações">
                    <i class="bi bi-bell"></i>
                </button>
                <button type="button" class="mosaico__bloco" aria-label="Mensagens">
                    <i class="bi bi-chat-dots"></i>
                </button>
                <button type="button" class="mosaico__bloco" aria-label="Perfil">
                    <i class="bi bi-person"></i>
                </button>
                <button type="button" class="mosaico__bloco mosaico__bloco--mais" aria-label="Mais opções">
                    <i class="bi bi-three-dots-vertical"></i>
                </button>
            </div>
        </nav>
    </body>
</html>
